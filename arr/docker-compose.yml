####################
# DOWNLOAD CLIENTS #
####################
  
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - WEBUI_PORT=${QBITTORRENT_PORT}
      - TZ=${TZ}
    networks:
      default:
        aliases:
          - qbittorrent.local
    ports:
      - ${QBITTORRENT_PORT}:${QBITTORRENT_PORT}
    volumes:
      - type: volume
        source: nfs-ext-config
        target: /config
        volume:
          nocopy: true
          subpath: qbittorrent
      - type: volume
        source: nfs-media
        target: /downloads
        volume:
          nocopy: true
          subpath: Downloads

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
      - HTTP_PROXY=http://gluetun:8888
      - HTTPS_PROXY=http://gluetun:8888
    networks:
      default:
        aliases:
          - sabnzbd.local
    ports:
      - ${SABNZBD_PORT:-8080}:8080
    volumes:
      - type: volume
        source: nfs-ext-config
        target: /config
        volume:
          nocopy: true
          subpath: sabnzbd
      - type: volume
        source: nfs-media
        target: /downloads
        volume:
          nocopy: true
          subpath: Downloads

#######
# VPN #
#######
  gluetun:
    hostname: gluetun
    image: qmcgaw/gluetun:latest
    # line above must be uncommented to allow external containers to connect.
    # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/connect-a-container-to-gluetun.md#external-container-to-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - ${GLUETUN_PORT:-8000}:8000 # Control endpoint
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
    volumes:
      - type: volume
        source: nfs-ext-config
        target: /gluetun
        volume:
          nocopy: true
          subpath: gluetun
    environment:
      # See https://github.com/qdm12/gluetun-wiki/tree/main/setup#setup
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      # OpenVPN:
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASS}
      # Wireguard:
      #- WIREGUARD_PRIVATE_KEY=
      #- WIREGUARD_ADDRESSES=10.64.222.21/32
      # Timezone for accurate log times
      - TZ=${TZ}
      - SERVER_COUNTRIES=United States
      # Server list updater
      # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/servers.md#update-the-vpn-servers-list
      - UPDATER_PERIOD=24h
      - BLOCK_MALICIOUS=off
      - DNS_UNBLOCK_HOSTNAMES=${UNBLOCK_URLS}
      - DNS_UPSTREAM_RESOLVERS=${DNS_UPSTREAM_RESOLVERS:-quad9,cloudflare}
      - DNS_CACHING=off
      - HEALTH_TARGET_ADDRESSES=${GLUETUN_HEALTH_PING:-9.9.9.9}
      - HTTPPROXY=on
      - HTTPPROXY_PORT=8888

volumes:
  nfs-media:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_IP},rw,nolock,soft,nfsvers=4"
      device: ":${MNT_MEDIA}"
  nfs-backups:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_IP},rw,nolock,soft,nfsvers=4"
      device: ":${MNT_BACKUPS}"
  nfs-ext-config:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_IP},rw,nolock,soft,nfsvers=4"
      device: ":${MNT_EXT_CONFIG}"

networks:
  default:
    driver: overlay
    name: arr_network
    internal: false
    attachable: true
  caddy:
    name: caddy
    external: true
