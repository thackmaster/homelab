services:

  bazarr: #subtitles
    image: lscr.io/linuxserver/bazarr:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - ${MNT_CONFIG}/bazarr:/config
      - nfs-media:/media
      - type: volume
        source: nfs-backups
        target: /config/backup
        volume:
          nocopy: true
          subpath: bazarr
    networks:
      default:
        aliases:
          - bazarr.local
    ports:
      - ${BAZARR_PORT:-6767}:6767
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE}
  
  prowlarr: #overview management
    image: lscr.io/linuxserver/prowlarr:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - ${MNT_CONFIG}/prowlarr:/config
      - nfs-media:/media
      - type: volume
        source: nfs-backups
        target: /config/Backups
        volume:
          nocopy: true
          subpath: prowlarr
    networks:
      default:
        aliases:
          - prowlarr.local
    ports:
      - ${PROWLARR_PORT:-9696}:9696
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE}
  
  radarr: #movies
    image: lscr.io/linuxserver/radarr:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - ${MNT_CONFIG}/radarr:/config
      - nfs-media:/media
      - type: volume
        source: nfs-backups
        target: /config/Backups
        volume:
          nocopy: true
          subpath: radarr
    networks:
      default:
        aliases:
          - radarr.local
    ports:
      - ${RADARR_PORT:-7878}:7878
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE}
      endpoint_mode: vip
  
  sonarr: #tv shows
    image: lscr.io/linuxserver/sonarr:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
    volumes:
      - ${MNT_CONFIG}/sonarr:/config
      - nfs-media:/media
      - type: volume
        source: nfs-backups
        target: /config/Backups
        volume:
          nocopy: true
          subpath: sonarr
    networks:
      default:
        aliases:
          - sonarr.local
    ports:
      - ${SONARR_PORT:-8989}:8989
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE}
      endpoint_mode: vip

  tautulli: #plex monitor
    image: lscr.io/linuxserver/tautulli:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=Etc/UTC
    volumes:
      - ${MNT_CONFIG}/tautulli/:/config
      - type: volume
        source: nfs-backups
        target: /config/backups
        volume:
          nocopy: true
          subpath: tautulli
    networks:
      default:
        aliases:
          - tautulli.local
    ports:
      - ${TAUTULLI_PORT:-8181}:8181
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE}
      endpoint_mode: vip
  
