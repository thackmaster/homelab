################
# REQUEST SITE #
################
  seerr: #requests
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      #- PORT=5055 #optional
    ports:
      - ${SEERR_PORT}:5055
    volumes:
      - type: volume
        source: nfs-ext-config
        target: /app/config
        volume:
          nocopy: true
          subpath: sonarr
    restart: unless-stopped
    networks:
      - default
      - caddy
    deploy:
      labels:
        caddy: ${REQUEST_URL}
        caddy.reverse_proxy: "{{ upstreams 5055 }}"

###################
# HELPER SERVICES #
###################

  kometa:
    image: kometateam/kometa:latest
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - TZ=${TZ}
      - KOMETA_RUN=${KOMETA_RUN} #run immediately
      - KOMETA_TIMES=05:00|17:00
    volumes:
      - type: volume
        source: nfs-ext-config
        target: /config
        volume:
          nocopy: true
          subpath: kometa
   
  maintainerr:
    image: maintainerr/maintainerr:latest
    user: ${UID}:${GID}
    environment:
      - TZ=${TZ}
    volumes:
      - type: volume
        source: nfs-ext-config
        target: /opt/data
        volume:
          nocopy: true
          subpath: maintainerr
    networks:
      default:
        aliases:
          - maintainerr.local
    ports:
      - ${MAINTAINERR_PORT:-6246}:6246
    dns:
      - 127.0.0.11
      - 172.16.1.10
      - 172.16.1.3

